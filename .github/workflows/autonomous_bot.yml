name: 自主论坛AI代理

on:
  schedule:
    # 每天 UTC 0:00 运行（北京时间 08:00），可根据需要调整
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖（验证码识别所需）
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt

      - name: 运行自主代理
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          TARGET_CATEGORIES: ${{ secrets.TARGET_CATEGORIES }}
          SKIP_LATEST: ${{ secrets.SKIP_LATEST }}
          LOGIN_RETRIES: ${{ secrets.LOGIN_RETRIES }}
          MAX_REPLY_THREADS: ${{ secrets.MAX_REPLY_THREADS }}
          MAX_REPLY_COMMENTS: ${{ secrets.MAX_REPLY_COMMENTS }}
          MAX_CREATE_THREADS: ${{ secrets.MAX_CREATE_THREADS }}
          DAILY_POST_LIMIT: ${{ secrets.DAILY_POST_LIMIT }}
          BLACKLIST_THREAD_IDS: ${{ secrets.BLACKLIST_THREAD_IDS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # 以下变量可选，用于原有风格/背景（如有）
          # STYLE_FILE: style.txt
          # BACKGROUND_FILE: mk48.txt
        run: |
          python autonomous_bot.py

      - name: 提交状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --quiet && git diff --staged --quiet || git commit -m "更新 AI 代理状态日志"
          git push
