name: 自主论坛AI代理

on:
  schedule:
    - cron:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.10'
  TZ: Asia/Shanghai

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行自主代理
        id: run_bot
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 40
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            echo "开始运行时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"
            python autonomous_bot.py 2>&1 | tee bot_output.log
          on_retry_command: echo "运行失败，将在30秒后重试..."
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          TARGET_CATEGORIES: ${{ secrets.TARGET_CATEGORIES }}
          SKIP_LATEST: ${{ secrets.SKIP_LATEST }}
          LOGIN_RETRIES: ${{ secrets.LOGIN_RETRIES }}
          MAX_REPLY_THREADS: ${{ secrets.MAX_REPLY_THREADS }}
          MAX_REPLY_COMMENTS: ${{ secrets.MAX_REPLY_COMMENTS }}
          MAX_CREATE_THREADS: ${{ secrets.MAX_CREATE_THREADS }}
          DAILY_POST_LIMIT: ${{ secrets.DAILY_POST_LIMIT }}
          BLACKLIST_THREAD_IDS: ${{ secrets.BLACKLIST_THREAD_IDS }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 保存运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: bot_output.log
          retention-days: 7

      - name: 提交状态文件
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add state.json
          if git diff --staged --quiet; then
            echo "无状态变化，跳过提交"
          else
            git commit -m "更新 AI 代理状态日志 (运行于 $(date '+%Y-%m-%d %H:%M:%S'))"
            git push origin main
          fi
